<!doctype html>
<html lang="uk-UA">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Галерея</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../style.css">
</head>

<body class="gallery-page">
  <div class="container">
    <header class="topbar">
      <div class="topbar__inner">

        <nav class="nav">
          <a class="nav__link" href="../">Головна</a>
          <a class="nav__link" href="../guild-ranking/">Рейтинг DPS</a>
          <a class="nav__link" href="../potion-stats/">Статистика Potion</a>
          <a class="nav__link nav__link--active" href="../gallery/">Галерея</a>
        </nav>
      </div>
    </header>

    <div class="container">
      <div class="container-inner">
        <h1>Галерея</h1>

        <div class="gallery-grid" id="galleryGrid" aria-label="Галерея скріншотів гільдії"></div>
      </div>
    </div>

    <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">
      <div class="gallery-lightbox-backdrop" data-close-lightbox></div>

      <div class="gallery-lightbox-content" role="dialog" aria-modal="true" aria-label="Перегляд скріншоту">
        <button class="gallery-lightbox-close" type="button" id="lightboxClose" aria-label="Закрити перегляд">
          ×
        </button>

        <img id="lightboxImage" src="" alt="">

        <div class="gallery-lightbox-footer">
          <button class="gallery-lightbox-nav gallery-lightbox-prev" type="button" id="lightboxPrev"
            aria-label="Попередній скріншот">
            ‹
          </button>

          <p id="lightboxCaption"></p>

          <button class="gallery-lightbox-nav gallery-lightbox-next" type="button" id="lightboxNext"
            aria-label="Наступний скріншот">
            ›
          </button>
        </div>
      </div>
    </div>

    <footer>
      <span>
        &copy; Гільдія "Nostalgia", сервер
        <a href="https://freedom-wow.in.ua/" target="_blank" rel="noopener noreferrer">
          Freedom WoW
        </a>
      </span>
    </footer>
  </div>

  <script src="../scripts/gallery.js"></script>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
    data-cf-beacon='{"token": "60fd199ec615489eaa708683f6fb26e7"}'></script><!-- End Cloudflare Web Analytics -->
</body>

</html>
