<!doctype html>
<html lang="uk-UA">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Рейд — Рейд-менеджер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
</head>

<body class="raid-manager-detail-page">
  <div class="container">

    <header class="topbar">
      <div class="topbar__inner">

        <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primaryNav" aria-label="Меню">
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav class="nav" id="primaryNav">
          <a class="nav__link nav__link--icon" href="../../" aria-label="Головна" title="Головна"><svg class="nav__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10"/></svg></a>
          <a class="nav__link" href="../../guild-ranking/">Рейтинг DPS</a>
          <a class="nav__link" href="../../potion-stats/">Статистика Potion</a>
          <a class="nav__link" href="../../analytics/">Аналітика</a>
          <a class="nav__link" href="../../personal-analytics/">Персональна Аналітика</a>
          <a class="nav__link nav__link--active" href="../../raid-manager/">Рейд-менеджер</a>
          <a class="nav__link" href="../../raid-manager/archive/">Архів рейдів</a>
          <a class="nav__link" href="../../gallery/">Галерея</a>
        </nav>
      </div>
    </header>

    <div class="container-inner">

      <h1 id="raidTitleHeading">Рейд</h1>

      <div id="raidSettingsBanner" class="raid-settings-banner"></div>

      <div class="raid-banner-actions">
        <div class="raid-banner-buttons">
          <button type="button" id="copyLinkBtn" class="link-button-std">Скопіювати лінк</button>
          <button type="button" id="officerAccessBtn" class="link-button-std">Ввести токен офіцера</button>
          <button type="button" id="officerNameBtn" class="link-button-std" hidden>Я: ...</button>
          <button type="button" id="lockToggleBtn" class="link-button-std" hidden>Заблокувати рейд</button>
          <button type="button" id="statusToggleBtn" class="link-button-std" hidden>Завершити рейд</button>
        </div>
        <p id="raidStatus">Завантаження...</p>
      </div>

      <div id="raidContent" hidden>

        <div class="raid-forms-grid">
          <div class="raid-form-col">
            <h2>Мій софт</h2>
            <form id="softForm" class="raid-soft-form">
              <label for="softPlayerName">Моє ім'я</label>
              <input type="text" id="softPlayerName" required autocomplete="off" placeholder="Твій персонаж">

              <label for="softBoss">Бос</label>
              <select id="softBoss"></select>

              <label for="softItem">Предмет</label>
              <select id="softItem"></select>

              <label for="softWeight">Вага</label>
              <select id="softWeight">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
              </select>

              <button type="submit" class="compare-btn">Софтнути</button>
            </form>
          </div>

          <div id="officerPanel" class="raid-officer-panel raid-form-col" hidden>
            <h2>Офіцерська панель</h2>
            <form id="officerAssignForm" class="raid-soft-form">
              <label for="assignPlayerName">Учасник</label>
              <div class="raid-input-wrap">
                <input type="text" id="assignPlayerName" required autocomplete="off" placeholder="Гравець гільдії або легіонер">
                <button type="button" class="raid-input-clear" id="assignPlayerNameClear" aria-label="Очистити">&times;</button>
                <div class="raid-autocomplete-list" id="assignPlayerNameList"></div>
              </div>

              <label for="assignBoss">Бос</label>
              <select id="assignBoss"></select>

              <label for="assignItem">Предмет</label>
              <select id="assignItem"></select>

              <label for="assignWeight">Вага</label>
              <select id="assignWeight">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
              </select>

              <button type="submit" class="compare-btn">Призначити софт</button>
            </form>
          </div>
        </div>

        <div class="raid-tabs" role="tablist">
          <button type="button" class="raid-tab raid-tab--active" data-tab="players">Гравці</button>
          <button type="button" class="raid-tab" data-tab="items">Предмети</button>
          <button type="button" class="raid-tab" data-tab="audit">Raid History</button>
        </div>

        <div class="raid-tables-grid">
          <div id="playersPane">
            <input type="text" id="playersSearch" placeholder="Пошук гравця..." class="raid-search-input">
            <div class="ranking-table-wrap">
              <table id="raidPlayersTable" class="raid-table">
                <thead>
                  <tr>
                    <th>Гравець</th>
                    <th>Софти</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="raidPlayersBody"></tbody>
              </table>
            </div>
          </div>

          <div id="itemsPane" hidden>
            <div class="raid-items-filters">
              <input type="text" id="itemsSearch" placeholder="Пошук предмета..." class="raid-search-input">
              <select id="itemsBossFilter">
                <option value="">Усі боси</option>
              </select>
              <label class="raid-filter-checkbox" for="itemsSoftedOnly">
                <input type="checkbox" id="itemsSoftedOnly" checked>
                Тільки засофчені
              </label>
            </div>
            <div class="ranking-table-wrap">
              <table id="raidItemsTable" class="raid-table">
                <thead>
                  <tr>
                    <th>Предмет</th>
                    <th>Слот</th>
                    <th>Бос</th>
                    <th>Резерви</th>
                  </tr>
                </thead>
                <tbody id="raidItemsBody"></tbody>
              </table>
            </div>
          </div>

          <div id="auditPane" hidden>
            <div id="auditList" class="raid-audit-list"></div>
          </div>
        </div>
      </div>

      <footer>
        <span>&copy; Гільдія "Nostalgia", сервер <a href="https://freedom-wow.in.ua/" target="_blank" rel="noopener noreferrer">Freedom WoW</a></span>
      </footer>
    </div>
  </div>

  <script src="../../scripts/nav.js"></script>
  <script src="../../scripts/raid-manager-shared.js"></script>
  <script src="../../scripts/raid-manager-detail.js"></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
    data-cf-beacon='{"token": "60fd199ec615489eaa708683f6fb26e7"}'></script><!-- End Cloudflare Web Analytics -->
</body>

</html>
