<!doctype html>
<html lang="uk-UA">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Персональна Аналітика</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css?v=2">
</head>

<body class="personal-analytics-page">
  <div class="container">

    <header class="topbar">
      <div class="topbar__inner">

        <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="primaryNav" aria-label="Меню">
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav class="nav" id="primaryNav">
          <a class="nav__link nav__link--icon" href="../" aria-label="Головна" title="Головна"><svg class="nav__icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10"/></svg></a>
          <div class="nav__dropdown">
            <button type="button" class="nav__link nav__dropdown-trigger" aria-haspopup="true" aria-expanded="false">⚔️ Рейд-менеджер</button>
            <div class="nav__dropdown-menu">
              <a class="nav__link" href="../raid-manager/">➕ Створити рейд</a>
              <a class="nav__link" href="../raid-manager/archive/">📂 Архів рейдів</a>
            </div>
          </div>
          <a class="nav__link" href="../potion-stats/">🧪 Статистика Potion</a>
          <a class="nav__link" href="../guild-ranking/">🏆 Рейтинг DPS</a>
          <div class="nav__dropdown">
            <button type="button" class="nav__link nav__dropdown-trigger nav__link--active" aria-haspopup="true" aria-expanded="false">📊 Аналітика</button>
            <div class="nav__dropdown-menu">
              <a class="nav__link" href="../analytics/">🏰 Гільдійська аналітика</a>
              <a class="nav__link nav__link--active" href="../personal-analytics/">👤 Персональна аналітика</a>
            </div>
          </div>
          <a class="nav__link" href="../gallery/">🖼️ Галерея</a>
          <span class="nav__auth-slot" id="authNavSlot"></span>
        </nav>
      </div>
    </header>

    <div class="container-inner">

      <h1>Персональна Аналітика</h1>

      <div class="ranking-controls player-controls-grid">
        <label for="playerSelect">Гравець 1</label>
        <div class="autocomplete-wrap">
          <input type="text" id="playerSelect" autocomplete="off" placeholder="Почни вводити ім'я...">
          <button type="button" class="autocomplete-clear" id="playerSelectClear" aria-label="Очистити">&times;</button>
          <div class="autocomplete-list" id="playerSelectList"></div>
        </div>

        <label for="player1Spec">Спек</label>
        <select id="player1Spec" disabled>
          <option value="">Усі спеки</option>
        </select>
        <span id="player1RaidCount" class="player-raid-count"></span>

        <label for="player2Select">Гравець 2</label>
        <div class="autocomplete-wrap">
          <input type="text" id="player2Select" autocomplete="off" placeholder="Без порівняння (опційно)">
          <button type="button" class="autocomplete-clear" id="player2SelectClear" aria-label="Очистити">&times;</button>
          <div class="autocomplete-list" id="player2SelectList"></div>
        </div>

        <label for="player2Spec">Спек</label>
        <select id="player2Spec" disabled>
          <option value="">Усі спеки</option>
        </select>
        <span id="player2RaidCount" class="player-raid-count"></span>
      </div>

      <div class="boss-checkboxes-head">
        <span>Боси</span>
        <button type="button" id="selectAllBosses" class="link-button">Обрати всі</button>
        <button type="button" id="deselectAllBosses" class="link-button">Зняти всі</button>

        <div class="spline-select-wrap">
          <label for="splineSelect">Тип лінії</label>
          <select id="splineSelect">
            <option value="smooth">Плавна</option>
            <option value="smoothNoPoints" selected>Плавна без точок</option>
            <option value="linear">Пряма</option>
            <option value="linearNoPoints">Пряма без точок</option>
            <option value="trend">Лінія тренду</option>
          </select>
        </div>
      </div>
      <div class="boss-checkboxes" id="bossCheckboxes"></div>

      <p id="tableStatus"></p>

      <div class="personal-analytics-chart-wrap">
        <canvas id="chartPersonalDps"></canvas>
      </div>

      <footer>
        <span>&copy; Гільдія "Nostalgia", сервер <a href="https://freedom-wow.in.ua/" target="_blank" rel="noopener noreferrer">Freedom WoW</a></span>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../scripts/nav.js"></script>
  <script src="../scripts/auth-shared.js?v=6"></script>
  <script src="../scripts/name-translations.js"></script>
  <script src="../scripts/personal-analytics.js"></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
    data-cf-beacon='{"token": "60fd199ec615489eaa708683f6fb26e7"}'></script><!-- End Cloudflare Web Analytics -->
</body>

</html>
