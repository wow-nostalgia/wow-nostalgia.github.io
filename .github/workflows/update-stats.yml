name: Update Stats

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run update:raid

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/potion-stats.json data/personal-stats.json data/honor-board.json data/raid-rosters.json
          git diff --staged --quiet || git commit -m "chore: auto-update potion and personal stats"
          git pull --rebase --autostash origin main
          git push
